<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索未来 | 独一无二的个人空间</title>
    <style>
        /* 清除默认样式与核心变量 */
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 独一无二的流体渐变背景 */
        body {
            background: #0f172a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        body::before {
            background: var(--primary);
            top: -10%;
            left: -10%;
            animation: float 12s infinite alternate;
        }

        body::after {
            background: var(--secondary);
            bottom: -10%;
            right: -10%;
            animation: float 12s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 50px) scale(1.2); }
        }

        /* 玻璃拟态主体卡片 */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 950px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 3rem;
            align-items: center;
        }

        /* 左侧：个人主视觉 */
        .profile-section {
            text-align: center;
            border-right: 1px solid var(--glass-border);
            padding-right: 3rem;
        }

        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
        }

        /* 头像呼吸发光环 */
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            z-index: -1;
            animation: rotate-gradient 6s linear infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            border: 4px solid #0f172a;
        }

        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag {
            font-size: 0.9rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* 右侧：内容与项目 */
        .content-section h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            background: linear-gradient(45deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* 特色网格卡片 */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .feature-card h3 {
            font-size: 1rem;
            margin-bottom: 0.4rem;
            color: #fff;
        }

        .feature-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 极简发光按钮 */
        .cta-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            letter-spacing: 1px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 2rem;
                gap: 2rem;
            }
            .profile-section {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid var(--glass-border);
                padding-bottom: 2rem;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .content-section h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-section">
            <div class="avatar-wrapper">
                <div class="avatar">✨</div>
            </div>
            <h2 class="name">Aether Design</h2>
            <p class="tag">Digital Creator</p>
        </div>

        <div class="content-section">
            <h1>用代码与美学<br>重塑数字体验</h1>
            <p class="description">
                拒绝千篇一律的设计。我们坚信每一个像素都应该拥有灵魂，通过极致的细节追求与前沿的技术探索，为不凡的创意打造独一无二的数字载体。
            </p>
            
            <div class="features">
                <div class="feature-card">
                    <h3>💡 极致视觉</h3>
                    <p>打破传统布局，融入未来主义美学。</p>
                </div>
                <div class="feature-card">
                    <h3>⚡ 闪电加载</h3>
                    <p>纯净无依赖代码，享受极致的响应速度。</p>
                </div>
            </div>

            <a href="mailto:your-email@example.com" class="cta-btn">即刻启航</a>
        </div>
    </div>

</body>
</html>
